<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anecdote — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{--paper:#EAE5DC;--bg:#ECE7DD;--card:#FBFAF6;--ink:#191713;--ink2:#46423A;--stone:#8C857A;--clay:#B26B3F;--line:rgba(25,23,19,.14);--line2:rgba(25,23,19,.07);--side:#1A1714}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Archivo',system-ui,sans-serif;line-height:1.5}
.app{display:flex;min-height:100vh}
/* sidebar */
.sidebar{width:248px;background:var(--side);color:#E7E1D6;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;transition:transform .25s}
.brand{padding:24px 22px 6px;display:flex;align-items:center;gap:9px}
.brand-logo{height:22px;width:auto;filter:brightness(0) invert(1)}
.login-logo{height:46px;width:auto;margin-bottom:18px}
.brand span{font-style:italic;color:var(--clay);font-size:14px}
.navlabel{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8a8175;padding:18px 24px 8px}
.nav{flex:1;overflow-y:auto;padding:0 12px 12px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:0;color:#cfc8bb;font-family:'Archivo';font-size:14px;font-weight:500;padding:10px 12px;border-radius:9px;cursor:pointer;transition:.15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--clay);color:#fff}
.nav-item .num{font-size:10.5px;font-weight:700;letter-spacing:.04em;opacity:.55;min-width:16px}
.nav-item.active .num{opacity:.9}
.side-foot{border-top:1px solid rgba(255,255,255,.08);padding:14px 18px;font-size:12px}
.side-foot .user{color:#9a9183;margin-bottom:9px;word-break:break-all}
.logout{display:flex;align-items:center;gap:8px;background:none;border:0;color:#cfc8bb;font-family:'Archivo';font-size:13px;font-weight:600;cursor:pointer;padding:4px 0}
.logout:hover{color:var(--clay)}
/* main */
.main{flex:1;margin-left:248px;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:rgba(236,231,221,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:13px 26px}
.burger{display:none;background:none;border:0;cursor:pointer;font-size:18px;color:var(--ink);line-height:1}
.topbar-title{font-size:14px;font-weight:600;color:var(--ink2);flex:1}
.topbar-actions{display:flex;gap:9px}
.btn{font-size:12px;font-weight:600;letter-spacing:.02em;padding:9px 16px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;transition:.18s;white-space:nowrap}
.btn:hover{border-color:var(--ink)}
.btn.primary{background:var(--clay);border-color:var(--clay);color:#fff}
.btn.primary:hover{background:#9c5a31;border-color:#9c5a31}
.btn:disabled{opacity:.55;pointer-events:none}
.content{padding:30px 26px 80px;max-width:820px;width:100%}
.page-h{font-family:'Fraunces',serif;font-weight:400;font-size:34px;letter-spacing:-.01em;margin-bottom:20px}
.tip{font-size:12.5px;color:var(--ink2);background:var(--card);border:1px solid var(--line2);border-left:3px solid var(--clay);border-radius:10px;padding:13px 16px;margin-bottom:20px}
.tip b{color:var(--ink)}
/* card */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(25,23,19,.04)}
.card-h{display:flex;align-items:center;gap:11px;font-family:'Fraunces',serif;font-size:20px;padding:18px 22px;border-bottom:1px solid var(--line2)}
.card-no{font-family:'Archivo';font-size:12px;font-weight:700;color:var(--clay)}
.card-body{padding:20px 22px}
/* fields */
.fld{margin-bottom:18px}.fld:last-child{margin-bottom:0}
.lbl{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:7px}
input[type=text],input[type=number],input[type=password],textarea{width:100%;font-family:'Archivo';font-size:14.5px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 13px;transition:.18s}
input:focus,textarea:focus{outline:none;border-color:var(--clay);box-shadow:0 0 0 3px rgba(178,107,63,.12)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.listta{min-height:104px;font-family:ui-monospace,monospace;font-size:13px}
.hint{font-size:11px;color:var(--stone);margin-top:5px}
.objlist{display:flex;flex-direction:column;gap:14px}
.olcard{border:1px solid var(--line2);border-left:3px solid var(--clay);border-radius:10px;padding:15px 16px;background:#fff}
.olhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.olnum{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--stone)}
.mini{font-size:11px;font-weight:600;letter-spacing:.04em;padding:6px 12px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink2);cursor:pointer}
.mini:hover{border-color:var(--clay);color:var(--clay)}
.mini.add{align-self:flex-start;margin-top:2px}
/* toast + login */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:12px 22px;border-radius:100px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:300}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.login{position:fixed;inset:0;z-index:400;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
.login.hidden{display:none}
.login .card2{width:min(360px,100%);text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:34px 30px;box-shadow:0 10px 40px rgba(25,23,19,.08)}
.login h2{font-family:'Fraunces',serif;font-weight:400;font-size:30px;margin-bottom:5px}
.login h2 span{font-style:italic;color:var(--clay)}
.login p{font-size:13px;color:var(--ink2);margin-bottom:22px}
.login input{text-align:center;margin-bottom:12px}
.login .err{color:var(--clay);font-size:12px;min-height:16px;margin-bottom:10px}
.scrim{display:none}
@media(max-width:820px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .burger{display:block}
  .scrim.on{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:45}
}
</style>
</head>
<body>
<div class="login" id="login">
  <div class="card2">
    <img src="anecdote-logo.png" class="login-logo" alt="Anecdote">
    <p>Enter your password to manage the site.</p>
    <input type="password" id="loginPw" placeholder="Password" autocomplete="current-password">
    <div class="err" id="loginErr"></div>
    <button class="btn primary" id="loginBtn" style="width:100%;padding:11px">Log in</button>
  </div>
</div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img src="anecdote-logo.png" class="brand-logo" alt="Anecdote"> <span>admin</span></div>
    <div class="navlabel">Sections</div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="user" id="userLine">Signed in</div>
      <button class="logout" id="logoutBtn">↩ Logout</button>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main class="main">
    <header class="topbar">
      <button class="burger" id="burger" aria-label="Menu">☰</button>
      <div class="topbar-title" id="topTitle">Dashboard</div>
      <div class="topbar-actions">
        <button class="btn" id="importBtn">Import</button>
        <button class="btn" id="dlBtn">Download</button>
        <button class="btn primary" id="pubBtn">Publish to site</button>
      </div>
    </header>
    <div class="content">
      <div class="tip"><b>Tip:</b> wrap a word in <b>*asterisks*</b> to render it as the italic accent colour. <b>Publish to site</b> pushes all your changes live in ~30 seconds.</div>
      <h1 class="page-h" id="pageH">Hero</h1>
      <div id="form"></div>
    </div>
  </main>
</div>

<input type="file" id="fileIn" accept="application/json,.json" hidden>
<div class="toast" id="toast"></div>

<script>
const DEFAULT={"hero": {"metaLeft": "VOL. 01 — FULL-SERVICE DIGITAL MARKETING", "metaRight": "JAKARTA · INDONESIA", "line1": "We make brands", "line2": "impossible", "line3": "to ignore.", "deck": "Personalized, full-service digital marketing — engineered in Jakarta, felt everywhere. We turn attention into measurable growth.", "cta1": "See the Work →", "cta2": "What We Do", "stats": [{"value": "Est. 2019", "label": "Studio"}, {"value": "150+", "label": "Campaigns"}, {"value": "50+", "label": "Brands"}]}, "marquee": ["Meta Ads", "Social", "Branding", "SEO", "Content", "E-commerce", "Web", "Influencer"], "manifesto": "Attention is the rarest thing on earth. We *capture* it, refine it, and hand it back to you as growth.", "services": {"title": "What we do", "items": [{"title": "Digital Advertising", "tag": "Performance, engineered.", "list": ["Meta Ads", "Search (SEM)", "SEO", "E-commerce Advertising", "Email Marketing"]}, {"title": "Brand Communication", "tag": "Stories that compound.", "list": ["Social Media Management", "Photography", "Video Production", "Branding", "Live Shopping"]}, {"title": "Consulting & PR", "tag": "Reputation as an asset.", "list": ["Influencer Management", "Online Reputation Management", "Marketing Strategy"]}]}, "work": {"items": [{"sector": "Health & Beauty", "metric": "+312%", "note": "Return on ad spend, delivered in the first 90 days."}, {"sector": "Food & Beverage", "metric": "4.2M", "note": "Organic reach from a single, tightly art-directed campaign."}, {"sector": "Property", "metric": "−47%", "note": "Cost-per-lead, cut while volume climbed."}, {"sector": "Retail", "metric": "72h", "note": "From launch to sold-out — momentum, engineered."}]}, "stats": [{"count": 150, "suffix": "+", "label": "Campaigns"}, {"count": 50, "suffix": "+", "label": "Clients"}, {"count": 5, "suffix": "+", "label": "Years"}, {"count": 3, "suffix": "", "label": "Service Pillars"}], "process": {"items": [{"k": "01", "title": "Extract", "text": "We dig into your market, your data, and your audience until the real opportunity surfaces."}, {"k": "02", "title": "Define", "text": "Strategy and creative concepting, sharpened until the idea is unmistakable."}, {"k": "03", "title": "Build", "text": "Campaigns built, shipped, and fully instrumented across every channel that matters."}, {"k": "04", "title": "Refine", "text": "Relentless optimization toward measurable, compounding growth. Never set-and-forget."}]}, "clients": [{"name": "CDR Bayer", "mark": "CB"}, {"name": "Redoxon", "mark": "RX"}, {"name": "Polytron", "mark": "PT"}, {"name": "UOB Bank", "mark": "UO"}, {"name": "Sari Rasa", "mark": "SR"}, {"name": "Nusantara", "mark": "NC"}, {"name": "Batik Prima", "mark": "BP"}, {"name": "Kopi Lokal", "mark": "KL"}, {"name": "Garda Tekno", "mark": "GT"}, {"name": "Mega Retail", "mark": "MR"}], "testimonial": {"quote": "They didn't just run our ads — they *reshaped* how the market sees us.", "author": "Marketing Lead · Enterprise Client", "note": "Representative placeholder — swap for a real attributed client quote before launch."}, "contact": {"title": "Ready to *grow?*", "email": "hello@anecdote.id", "whatsappLabel": "Chat with us", "whatsapp": "6281234567890", "instagram": "anecdote.id"}, "footer": {"colophon": "Crafted, not templated. A full-service digital marketing studio in Jakarta."}};
let data=clone(DEFAULT);
function clone(o){return JSON.parse(JSON.stringify(o));}
function merge(a,b){ if(b===null||typeof b!=='object'||Array.isArray(b))return b===undefined?a:b; const o=Object.assign({},a); for(const k in b)o[k]=(a&&k in a)?merge(a[k],b[k]):b[k]; return o; }

const SCHEMA=[
 {t:'Hero',f:[
   {p:'hero.metaLeft',l:'Top-left label'},
   {p:'hero.metaRight',l:'Top-right label'},
   {p:'hero.line1',l:'Headline — line 1'},
   {p:'hero.line2',l:'Headline — line 2 (italic accent)'},
   {p:'hero.line3',l:'Headline — line 3'},
   {p:'hero.deck',l:'Intro paragraph',type:'textarea'},
   {p:'hero.cta1',l:'Button 1 text'},
   {p:'hero.cta2',l:'Button 2 text'},
   {p:'hero.stats',l:'Hero stat badges',type:'objlist',fields:[{k:'value',l:'Value'},{k:'label',l:'Label'}]},
 ]},
 {t:'Ticker',f:[{p:'marquee',l:'Scrolling words',type:'list'}]},
 {t:'Manifesto',f:[{p:'manifesto',l:'Statement (use *asterisks* for accent)',type:'textarea'}]},
 {t:'Services',f:[
   {p:'services.title',l:'Section title'},
   {p:'services.items',l:'Service pillars',type:'objlist',fields:[{k:'title',l:'Title'},{k:'tag',l:'Tagline'},{k:'list',l:'Services',type:'list'}]},
 ]},
 {t:'Selected Work',f:[{p:'work.items',l:'Case studies',type:'objlist',fields:[{k:'sector',l:'Sector'},{k:'metric',l:'Big metric'},{k:'note',l:'Note',type:'textarea'}]}]},
 {t:'By the Numbers',f:[{p:'stats',l:'Counters',type:'objlist',fields:[{k:'count',l:'Number',type:'number'},{k:'suffix',l:'Suffix (e.g. +)'},{k:'label',l:'Label'}]}]},
 {t:'Process',f:[{p:'process.items',l:'Steps',type:'objlist',fields:[{k:'k',l:'No.'},{k:'title',l:'Title'},{k:'text',l:'Description',type:'textarea'}]}]},
 {t:'Clients',f:[{p:'clients',l:'Client badges',type:'objlist',fields:[{k:'name',l:'Name'},{k:'mark',l:'Monogram (2 letters)'}]}]},
 {t:'Testimonial',f:[
   {p:'testimonial.quote',l:'Quote (use *asterisks* for accent)',type:'textarea'},
   {p:'testimonial.author',l:'Attribution'},
   {p:'testimonial.note',l:'Small note (blank = hidden)'},
 ]},
 {t:'Contact',f:[
   {p:'contact.title',l:'Heading (use *asterisks* for accent)'},
   {p:'contact.email',l:'Email address'},
   {p:'contact.whatsappLabel',l:'WhatsApp link text'},
   {p:'contact.whatsapp',l:'WhatsApp number (e.g. 6281234567890)'},
   {p:'contact.instagram',l:'Instagram handle (no @)'},
 ]},
 {t:'Footer',f:[{p:'footer.colophon',l:'Colophon line'}]},
];

function el(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}
function resolve(path){const parts=path.split('.');let o=data;for(let i=0;i<parts.length-1;i++){if(o[parts[i]]==null)o[parts[i]]={};o=o[parts[i]];}return [o,parts[parts.length-1]];}
function blank(fields){const o={};fields.forEach(f=>o[f.k]=f.type==='list'?[]:f.type==='number'?0:'');return o;}

function control(obj,key,def){
  const w=el('div','fld'); w.append(el('label','lbl',def.l));
  const t=def.type||'text';
  if(t==='textarea'){const ta=el('textarea');ta.value=obj[key]||'';ta.oninput=()=>obj[key]=ta.value;w.append(ta);}
  else if(t==='number'){const i=el('input');i.type='number';i.value=obj[key]!=null?obj[key]:0;i.oninput=()=>obj[key]=Number(i.value);w.append(i);}
  else if(t==='list'){const ta=el('textarea','listta');ta.value=(obj[key]||[]).join('\n');ta.oninput=()=>obj[key]=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);w.append(ta);w.append(el('div','hint','One item per line'));}
  else if(t==='objlist'){w.append(objlist(obj,key,def));}
  else{const i=el('input');i.type='text';i.value=obj[key]||'';i.oninput=()=>obj[key]=i.value;w.append(i);}
  return w;
}
function objlist(parent,key,def){
  const box=el('div','objlist');
  function draw(){
    box.innerHTML='';
    (parent[key]||[]).forEach((item,idx)=>{
      const c=el('div','olcard');
      const head=el('div','olhead');head.append(el('span','olnum','# '+(idx+1)));
      const rm=el('button','mini','Remove');rm.onclick=()=>{parent[key].splice(idx,1);draw();};head.append(rm);
      c.append(head);
      def.fields.forEach(f=>c.append(control(item,f.k,f)));
      box.append(c);
    });
    const add=el('button','mini add','+ Add');add.onclick=()=>{parent[key]=parent[key]||[];parent[key].push(blank(def.fields));draw();};
    box.append(add);
  }
  draw();return box;
}

let active=0;
function selectSection(i){
  active=i;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',+n.dataset.i===i));
  document.getElementById('pageH').textContent=SCHEMA[i].t;
  document.getElementById('topTitle').textContent=SCHEMA[i].t;
  const root=document.getElementById('form');root.innerHTML='';
  const card=el('div','card');
  const ch=el('div','card-h');ch.append(el('span','card-no',String(i+1).padStart(2,'0')));ch.append(document.createTextNode(SCHEMA[i].t));
  card.append(ch);
  const body=el('div','card-body');
  SCHEMA[i].f.forEach(def=>{const [o,k]=resolve(def.p);body.append(control(o,k,def));});
  card.append(body);root.append(card);
  closeNav();window.scrollTo(0,0);
}
function buildNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  SCHEMA.forEach((s,i)=>{
    const b=el('button','nav-item');b.dataset.i=i;
    b.append(el('span','num',String(i+1).padStart(2,'0')));
    b.append(el('span','name',s.t));
    b.onclick=()=>selectSection(i);
    nav.append(b);
  });
}
function render(){buildNav();selectSection(Math.min(active,SCHEMA.length-1));}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);}
function download(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='content.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('content.json downloaded');
}
document.getElementById('dlBtn').onclick=download;
document.getElementById('importBtn').onclick=()=>document.getElementById('fileIn').click();
document.getElementById('fileIn').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{data=merge(DEFAULT,JSON.parse(r.result));render();toast('Imported');}catch(err){alert('Could not read that file: '+err.message);}};r.readAsText(f);};

/* mobile nav */
function openNav(){document.getElementById('sidebar').classList.add('open');document.getElementById('scrim').classList.add('on');}
function closeNav(){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').classList.remove('on');}
document.getElementById('burger').onclick=openNav;
document.getElementById('scrim').onclick=closeNav;

/* publish + login (token stays server-side; you log in with a password) */
async function api(payload){
  const r=await fetch('/api/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const j=await r.json().catch(()=>({}));
  return {ok:r.ok,status:r.status,j};
}
async function publish(){
  const btn=document.getElementById('pubBtn');const pw=sessionStorage.getItem('adminpw');
  if(!pw){showLogin();return;}
  btn.disabled=true;const old=btn.textContent;btn.textContent='Publishing…';
  try{
    const {ok,status,j}=await api({password:pw,content:data});
    if(ok)toast('Published — live in ~30s');
    else if(status===401){sessionStorage.removeItem('adminpw');toast('Session expired — log in again');showLogin();}
    else throw new Error(j.error||('HTTP '+status));
  }catch(e){toast('Could not publish: '+e.message);}
  finally{btn.disabled=false;btn.textContent=old;}
}
document.getElementById('pubBtn').onclick=publish;
document.getElementById('logoutBtn').onclick=()=>{sessionStorage.removeItem('adminpw');location.reload();};

function showLogin(){document.getElementById('login').classList.remove('hidden');setTimeout(()=>document.getElementById('loginPw').focus(),50);}
function hideLogin(){document.getElementById('login').classList.add('hidden');}
async function doLogin(){
  const pwEl=document.getElementById('loginPw'),err=document.getElementById('loginErr'),b=document.getElementById('loginBtn');
  const pw=pwEl.value.trim();if(!pw){err.textContent='Enter your password.';return;}
  b.disabled=true;b.textContent='Checking…';err.textContent='';
  try{
    const {ok,status,j}=await api({password:pw});
    if(ok){sessionStorage.setItem('adminpw',pw);pwEl.value='';hideLogin();toast('Logged in');}
    else if(status===401)err.textContent='Wrong password.';
    else err.textContent=j.error||('Error '+status);
  }catch(e){err.textContent='Cannot reach the server — is the site deployed with the publish function?';}
  finally{b.disabled=false;b.textContent='Log in';}
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('loginPw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
if(sessionStorage.getItem('adminpw'))hideLogin();else showLogin();

/* load existing content.json (works when served over http, e.g. on Vercel) */
(async()=>{try{const r=await fetch('content.json?_='+Date.now());if(r.ok){data=merge(DEFAULT,await r.json());}}catch(e){}render();})();
</script>
</body>
</html>
